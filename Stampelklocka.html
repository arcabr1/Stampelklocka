<!DOCTYPE html>    
<html lang="sv">    
<head>    
    <meta charset="UTF-8">    
    <title>Stämpelklocka</title>    
    <link rel="manifest" href="manifest.json">    
    <style>    
        body {    
            font-family: 'Segoe UI', Arial, sans-serif;    
            background: linear-gradient(135deg, #eaf2fb 60%, #d6e1f3 100%);    
            max-width: 700px;    
            margin: 30px auto;    
            padding: 24px;    
            border-radius: 18px;    
            box-shadow: 0 4px 24px rgba(52, 120, 226, 0.09);    
        }    
        .header {    
            display: flex;    
            align-items: center;    
            justify-content: space-between;    
            margin-bottom: 18px;    
        }    
        .logo {    
            font-size: 32px;    
            color: #3478e2;    
            font-weight: bold;    
            letter-spacing: 1px;    
        }    
        .clock-img {    
            width: 60px;    
            height: 60px;    
            border-radius: 50%;    
            object-fit: cover;    
            box-shadow: 0 2px 8px #3478e240;    
            margin-left: 16px;    
        }    
        h1 {    
            color: #3478e2;    
            text-align: center;    
            margin-top: 0;    
        }    
        .button-group {    
            text-align: center;    
            margin-bottom: 18px;    
        }    
        button {    
            margin: 6px;    
            padding: 10px 24px;    
            border: none;    
            border-radius: 6px;    
            background: #3478e2;    
            color: white;    
            font-size: 1rem;    
            font-weight: 500;    
            cursor: pointer;    
            transition: background .2s;    
            box-shadow: 0 2px 4px #3478e220;    
        }    
        button:hover {    
            background: #2356b5;    
        }    
        ul {    
            background: #fff;    
            border-radius: 7px;    
            padding: 16px;    
            list-style: none;    
            margin-top: 15px;    
            box-shadow: 0 2px 4px #3478e220;    
        }    
        ul li {    
            margin-bottom: 10px;    
            padding: 8px;    
            border-bottom: 1px solid #e4e4e4;    
            font-size: 1.05rem;    
        }    
        ul li:last-child {    
            border-bottom: none;    
        }    
        #summering {    
            background: #f8fafc;    
            border-radius: 6px;    
            padding: 18px;    
            margin-top: 24px;    
            box-shadow: 0 2px 8px #3478e220;    
        }    
        input[type="text"] {    
            width: 180px;    
            border-radius: 4px;    
            padding: 6px;    
            border: 1px solid #b8cbe6;    
            font-size: 1rem;    
        }    
        .logo {    
            display: flex;    
            align-items: center;    
        }    
        @media (max-width: 800px) {    
            body { max-width: 98vw; }    
        }    
    </style>    
</head>    
<body>    
    <div class="header">    
        <span class="logo">Stämpelklocka</span>    
        <!-- Byt src till din egen logotyp eller klockbild om du vill -->    
        <img class="clock-img" src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308?auto=format&fit=crop&w=600&q=80" alt="Klocka">    
    </div>    
    <div class="button-group">    
        <button onclick="stampla('in')">Stämpla in</button>    
        <button onclick="stampla('ut')">Stämpla ut</button>    
        <button onclick="exportera()">Exportera till CSV</button>    
        <button onclick="nollstall()">Nollställ tider</button>    
    </div>    
    <ul id="logg"></ul>    
    <div id="summering"></div>    
    
    <script>    
        let tider = JSON.parse(localStorage.getItem('stampeltider')) || [];    
        let redigeraIndex = null;    
    
        function visaTider() {    
            const logg = document.getElementById('logg');    
            logg.innerHTML = '';    
            tider.forEach((tidObj, index) => {    
                const li = document.createElement('li');    
                if (redigeraIndex === index) {    
                    li.innerHTML = `    
                        Stämplat ${tidObj.typ} kl.    
                        <input type="text" id="input-${index}" value="${formatTid24(tidObj.tid)}">    
                        <button onclick="sparaTid(${index})">Spara</button>    
                        <button onclick="avbrytRedigering()">Avbryt</button>    
                    `;    
                } else {    
                    li.innerHTML = `    
                        Stämplat ${tidObj.typ} kl. <span id="tid-${index}">${formatTid24(tidObj.tid)}</span>    
                        <button onclick="redigeraTid(${index})">Ändra</button>    
                    `;    
                }    
                logg.appendChild(li);    
            });    
            visaSummering();    
        }    
    
        visaTider();    
    
        function stampla(typ) {    
            const tid = new Date().toISOString();    
            tider.push({ typ, tid });    
            localStorage.setItem('stampeltider', JSON.stringify(tider));    
            redigeraIndex = null;    
            visaTider();    
        }    
    
        function redigeraTid(index) {    
            redigeraIndex = index;    
            visaTider();    
        }    
    
        function sparaTid(index) {    
            const input = document.getElementById(`input-${index}`);    
            const nyTid = input.value;    
            let isoTid = nyTid.includes('T') ? nyTid : nyTid.replace(' ', 'T');    
            if (isNaN(new Date(isoTid))) {    
                alert("Fel format på tid, använd t.ex. 2024-06-04 14:30:00");    
                return;    
            }    
            tider[index].tid = isoTid;    
            localStorage.setItem('stampeltider', JSON.stringify(tider));    
            redigeraIndex = null;    
            visaTider();    
        }    
    
        function avbrytRedigering() {    
            redigeraIndex = null;    
            visaTider();    
        }    
    
        function nollstall() {    
            if (confirm("Är du säker på att du vill nollställa alla tider?\nDetta går inte att ångra!")) {    
                localStorage.removeItem('stampeltider');    
                tider = [];    
                redigeraIndex = null;    
                visaTider();    
            }    
        }    
    
        function getWeek(date) {    
            date = new Date(date);    
            const target = new Date(date.valueOf());    
            target.setHours(0, 0, 0, 0);    
            target.setDate(target.getDate() + 4 - (target.getDay() || 7));    
            const yearStart = new Date(target.getFullYear(), 0, 1);    
            const weekNo = Math.ceil((((target - yearStart) / 86400000) + 1) / 7);    
            return `${target.getFullYear()}-v${weekNo}`;    
        }    
    
        function visaSummering() {    
            let summering = '';    
            let resultat = [];    
            let veckosumma = {};    
    
            for(let i=0; i<tider.length-1; i++) {    
                if(tider[i].typ === 'in' && tider[i+1].typ === 'ut') {    
                    let start = new Date(tider[i].tid);    
                    let end = new Date(tider[i+1].tid);    
                    let diffMs = end - start;    
                    if (!isNaN(diffMs) && diffMs > 0) {    
                        let diffMin = Math.floor(diffMs / 60000);    
                        let timmar = Math.floor(diffMin / 60);    
                        let minuter = diffMin % 60;    
                        resultat.push(`Från ${formatTid24(tider[i].tid)} till ${formatTid24(tider[i+1].tid)} — ${timmar} tim ${minuter} min`);    
                        let vecka = getWeek(start);    
                        if (!veckosumma[vecka]) veckosumma[vecka] = 0;    
                        veckosumma[vecka] += diffMs;    
                    }    
                }    
            }    
    
            summering = '<h2>Summering</h2>';    
            if(resultat.length > 0) {    
                summering += '<ul>' + resultat.map(r => `<li>${r}</li>`).join('') + '</ul>';    
            } else {    
                summering += '<p>Inga pass att summera ännu.</p>';    
            }    
    
            if(Object.keys(veckosumma).length > 0) {    
                summering += '<h3>Totalt per vecka</h3><ul>';    
                for(const vecka in veckosumma) {    
                    let diffMin = Math.floor(veckosumma[vecka] / 60000);    
                    let timmar = Math.floor(diffMin / 60);    
                    let minuter = diffMin % 60;    
                    summering += `<li>${vecka}: ${timmar} tim ${minuter} min</li>`;    
                }    
                summering += '</ul>';    
            }    
    
            document.getElementById('summering').innerHTML = summering;    
        }    
    
        function exportera() {    
            let csv = "Typ,Tid\n";    
            tider.forEach(tid => {    
                csv += `${tid.typ},${formatTid24(tid.tid)}\n`;    
            });    
    
            const blob = new Blob([csv], { type: 'text/csv' });    
            const url = URL.createObjectURL(blob);    
            const a = document.createElement('a');    
            a.href = url;    
            a.download = 'stampeltider.csv';    
            document.body.appendChild(a);    
            a.click();    
            document.body.removeChild(a);    
        }    
    
        function formatTid24(isoTid) {    
            let date = new Date(isoTid);    
            if (isNaN(date)) return isoTid;    
            let y = date.getFullYear();    
            let m = String(date.getMonth()+1).padStart(2,'0');    
            let d = String(date.getDate()).padStart(2,'0');    
            let h = String(date.getHours()).padStart(2,'0');    
            let min = String(date.getMinutes()).padStart(2,'0');    
            let s = String(date.getSeconds()).padStart(2,'0');    
            return `${y}-${m}-${d} ${h}:${min}:${s}`;    
        }    
    
        // PWA: service worker    
        if ('serviceWorker' in navigator) {    
            window.addEventListener('load', function() {    
                navigator.serviceWorker.register('service-worker.js');    
            });    
        }    
    </script>    
</body>    
</html>
